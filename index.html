<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYC Housing Policy Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>NYC Housing Policy Map</h1>
      <p>Interactive starter map for zoning, restrictions, and housing policy context.</p>
    </header>

    <main class="layout">
      <aside class="panel" aria-label="Policy filters">
        <h2>Filters</h2>

        <label for="boroughFilter">Borough</label>
        <select id="boroughFilter">
          <option value="all">All boroughs</option>
          <option value="Manhattan">Manhattan</option>
          <option value="Brooklyn">Brooklyn</option>
          <option value="Queens">Queens</option>
          <option value="Bronx">Bronx</option>
          <option value="Staten Island">Staten Island</option>
        </select>

        <label class="checkbox" for="overlayOnly">
          <input type="checkbox" id="overlayOnly" />
          Affordable housing overlay only
        </label>

        <label for="minFar">Minimum allowed FAR: <span id="minFarLabel">0.0</span></label>
        <input id="minFar" type="range" min="0" max="16" step="0.5" value="0" />

        <button id="resetBtn" type="button">Reset filters</button>

        <section class="stats" aria-live="polite">
          <h3>Visible Areas</h3>
          <p><strong id="visibleCount">0</strong> policy areas</p>
          <p>Average allowed FAR: <strong id="avgFar">0.0</strong></p>
        </section>

        <section class="legend">
          <h3>FAR Legend</h3>
          <ul>
            <li><span class="swatch low"></span>Low density (0-4)</li>
            <li><span class="swatch med"></span>Medium density (4-8)</li>
            <li><span class="swatch high"></span>High density (8+)</li>
          </ul>
        </section>
      </aside>

      <section class="map-wrap">
        <div id="map" role="application" aria-label="NYC housing policy map"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js" defer></script>
  </body>
</html>
