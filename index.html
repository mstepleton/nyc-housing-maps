<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYC Housing Policy Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="map" role="application" aria-label="NYC housing policy map"></div>

    <button id="openPanelBtn" class="floating-open" type="button" aria-controls="filterPanel" aria-expanded="true">
      Show filters
    </button>

    <aside id="filterPanel" class="filter-panel" aria-label="Policy filters">
      <div class="panel-head">
        <div>
          <h1>NYC Housing Policy Map</h1>
          <p>Zoning + restriction explorer</p>
        </div>
        <button id="closePanelBtn" class="ghost-btn" type="button" aria-label="Hide filters">Hide</button>
      </div>

      <label for="boroughFilter">Borough</label>
      <select id="boroughFilter">
        <option value="all">All boroughs</option>
        <option value="Manhattan">Manhattan</option>
        <option value="Brooklyn">Brooklyn</option>
        <option value="Queens">Queens</option>
        <option value="Bronx">Bronx</option>
        <option value="Staten Island">Staten Island</option>
      </select>

      <label class="checkbox" for="overlayOnly">
        <input type="checkbox" id="overlayOnly" />
        Affordable housing overlay only
      </label>

      <label for="minFar">Minimum allowed FAR: <span id="minFarLabel">0.0</span></label>
      <input id="minFar" type="range" min="0" max="16" step="0.5" value="0" />

      <button id="resetBtn" type="button">Reset filters</button>

      <section class="stats" aria-live="polite">
        <p><strong id="visibleCount">0</strong> areas visible</p>
        <p>Average FAR: <strong id="avgFar">0.0</strong></p>
      </section>
    </aside>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js" defer></script>
  </body>
</html>
